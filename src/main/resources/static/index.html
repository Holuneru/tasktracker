<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskTracker - Управление проектами и задачами</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e9eef5 100%);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            padding: 1.5rem;
            margin-bottom: 2rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1e293b, #2d3e5f);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 1.25rem;
            border-left: 4px solid #3b82f6;
            padding-left: 1rem;
        }

        h3 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #334155;
            margin-bottom: 1rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: #475569;
            margin-bottom: 0.4rem;
        }

        input, select, textarea {
            width: 100%;
            padding: 0.7rem 1rem;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            font-size: 0.9rem;
            transition: all 0.2s;
            background: #fefefe;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
        }

        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-right: 0.5rem;
            margin-top: 0.5rem;
        }

        button:hover {
            background: #2563eb;
            transform: translateY(-1px);
        }

        button.danger {
            background: #ef4444;
        }
        button.danger:hover {
            background: #dc2626;
        }

        button.secondary {
            background: #64748b;
        }
        button.secondary:hover {
            background: #475569;
        }

        button.success {
            background: #10b981;
        }
        button.success:hover {
            background: #059669;
        }

        button.small {
            padding: 0.3rem 0.8rem;
            font-size: 0.75rem;
        }

        .grid-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .task-card, .project-card, .user-card {
            background: #f8fafc;
            border-radius: 20px;
            padding: 1rem;
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
        }

        .task-card:hover, .project-card:hover {
            background: #ffffff;
            border-color: #cbd5e1;
        }

        .task-title, .project-name {
            font-weight: 700;
            font-size: 1rem;
            color: #0f172a;
        }

        .task-meta, .project-meta {
            font-size: 0.75rem;
            color: #475569;
            margin: 0.5rem 0;
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .status-TODO { background: #f1f5f9; color: #1e293b; }
        .status-IN_PROGRESS { background: #fef9c3; color: #854d0e; }
        .status-DONE { background: #d1fae5; color: #065f46; }

        .priority-LOW { background: #e0f2fe; color: #0369a1; }
        .priority-MEDIUM { background: #fff3e3; color: #b45309; }
        .priority-HIGH { background: #fee2e2; color: #b91c1c; }

        .nav-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .tab-btn {
            background: #e2e8f0;
            color: #334155;
            margin: 0;
        }
        .tab-btn.active {
            background: #3b82f6;
            color: white;
        }

        .hidden {
            display: none;
        }

        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .mt-2 { margin-top: 1rem; }
        .mt-3 { margin-top: 1.5rem; }
        .mb-2 { margin-bottom: 1rem; }
        .text-sm { font-size: 0.8rem; }
        .text-center { text-align: center; }
        
        hr {
            margin: 1rem 0;
            border-color: #e2e8f0;
        }

        .login-container {
            max-width: 450px;
            margin: 4rem auto;
        }

        .error-msg {
            color: #dc2626;
            font-size: 0.8rem;
            margin-top: 0.5rem;
        }

        .comment-section {
            margin-top: 1rem;
            padding-top: 0.5rem;
            border-top: 1px solid #e2e8f0;
        }

        .comment-item {
            background: #ffffff;
            padding: 0.75rem;
            margin-top: 0.5rem;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }

        .comment-text {
            font-size: 0.85rem;
            margin: 0.5rem 0;
        }

        .comment-meta {
            font-size: 0.7rem;
            color: #64748b;
        }

        .project-filter {
            margin-bottom: 1rem;
            padding: 0.5rem;
            background: #f1f5f9;
            border-radius: 12px;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: #64748b;
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <!-- Панель авторизации -->
    <div id="authPanel" class="card login-container">
        <h1 style="text-align: center;">📋 TaskTracker</h1>
        <p style="text-align: center; margin-bottom: 1.5rem;">Войдите или зарегистрируйтесь</p>
        
        <div id="loginForm">
            <div class="form-group">
                <label>Имя пользователя</label>
                <input type="text" id="loginName" placeholder="username">
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="loginPassword" placeholder="минимум 8 символов">
            </div>
            <button id="doLoginBtn">Войти</button>
            <button id="showRegisterBtn" class="secondary">Зарегистрироваться</button>
            <div id="loginError" class="error-msg"></div>
        </div>

        <div id="registerForm" class="hidden">
            <div class="form-group">
                <label>Имя (уникальное)</label>
                <input type="text" id="regName" placeholder="username">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="regEmail" placeholder="email@example.com">
            </div>
            <div class="form-group">
                <label>Пароль (мин. 8 символов)</label>
                <input type="password" id="regPassword" placeholder="******">
            </div>
            <button id="doRegisterBtn">Зарегистрироваться</button>
            <button id="backToLoginBtn" class="secondary">Назад</button>
            <div id="regError" class="error-msg"></div>
        </div>
    </div>

    <!-- Основной интерфейс -->
    <div id="mainApp" class="hidden">
        <div class="flex-between" style="margin-bottom: 1rem;">
            <h1>📌 TaskTracker</h1>
            <div>
                <span id="currentUserSpan" style="font-weight: 500; margin-right: 1rem;"></span>
                <button id="logoutBtn" class="danger">Выйти</button>
            </div>
        </div>

        <!-- Вкладки -->
        <div class="nav-tabs">
            <button class="tab-btn active" data-tab="projects">📁 Все проекты</button>
            <button class="tab-btn" data-tab="myProjects">👤 Мои проекты</button>
            <button class="tab-btn" data-tab="tasks">✅ Все задачи</button>
            <button class="tab-btn" data-tab="users">👥 Пользователи</button>
        </div>

        <!-- Все проекты -->
        <div id="projectsTab" class="tab-content">
            <div class="card">
                <h2>📂 Все проекты</h2>
                <div id="allProjectsList" class="grid-list">Загрузка...</div>
            </div>
        </div>

        <!-- Мои проекты -->
        <div id="myProjectsTab" class="tab-content hidden">
            <div class="card">
                <h2>➕ Создать новый проект</h2>
                <div class="form-group">
                    <label>Название проекта</label>
                    <input type="text" id="projectName" placeholder="Новый проект">
                </div>
                <div class="form-group">
                    <label>Описание</label>
                    <textarea id="projectDesc" rows="2" placeholder="Описание..."></textarea>
                </div>
                <button id="createProjectBtn" class="success">Создать проект</button>
            </div>

            <div class="card">
                <h2>👤 Мои проекты</h2>
                <div id="myProjectsList" class="grid-list">Загрузка...</div>
            </div>
        </div>

        <!-- Задачи -->
        <div id="tasksTab" class="tab-content hidden">
            <div class="card">
                <h2>✨ Создать задачу</h2>
                <div class="form-group">
                    <label>Название задачи</label>
                    <input type="text" id="taskTitle" placeholder="Название">
                </div>
                <div class="form-group">
                    <label>Описание</label>
                    <textarea id="taskDesc" rows="2" placeholder="Подробности..."></textarea>
                </div>
                <div class="form-group">
                    <label>Проект</label>
                    <select id="taskProjectId"></select>
                </div>
                <div class="form-group">
                    <label>Исполнитель</label>
                    <select id="taskAssigneeId"></select>
                </div>
                <div class="form-group">
                    <label>Приоритет</label>
                    <select id="taskPriority">
                        <option value="LOW">Низкий</option>
                        <option value="MEDIUM" selected>Средний</option>
                        <option value="HIGH">Высокий</option>
                    </select>
                </div>
                <button id="createTaskBtn" class="success">Создать задачу</button>
            </div>

            <div class="card">
                <h2>📋 Все задачи</h2>
                <div class="project-filter">
                    <label>Фильтр по проекту:</label>
                    <select id="filterProjectId">
                        <option value="all">Все проекты</option>
                    </select>
                </div>
                <div id="tasksList" class="grid-list">Загрузка задач...</div>
            </div>
        </div>

        <!-- Пользователи -->
        <div id="usersTab" class="tab-content hidden">
            <div class="card">
                <h2>👥 Все пользователи</h2>
                <div id="usersList" class="grid-list">Загрузка...</div>
            </div>
        </div>
    </div>
</div>

<script>
    const API_BASE = '/api';
    
    let currentUser = null;
    let usersMap = new Map();
    let projectsMap = new Map();
    let allTasks = [];
    let commentsCache = new Map(); // taskId -> comments[]

    // HTTP запросы
    async function apiRequest(endpoint, method = 'GET', body = null) {
        const options = {
            method,
            headers: { 'Content-Type': 'application/json' },
        };
        if (body) options.body = JSON.stringify(body);
        
        const response = await fetch(`${API_BASE}${endpoint}`, options);
        
        if (!response.ok) {
            let errMsg = `Ошибка ${response.status}`;
            try {
                const errData = await response.text();
                errMsg = errData || errMsg;
            } catch(e) {}
            throw new Error(errMsg);
        }
        
        if (method === 'DELETE') return null;
        return await response.json();
    }

    // API вызовы
    async function registerUser(name, email, password) {
        return await apiRequest('/users/register', 'POST', { name, email, password });
    }

    async function loginUser(name, password) {
        return await apiRequest('/users/login', 'POST', { name, password });
    }

    async function loadAllUsers() {
        try {
            const users = await apiRequest('/users', 'GET');
            usersMap.clear();
            users.forEach(u => usersMap.set(u.id, { name: u.name, email: u.email, id: u.id }));
            renderUsersList();
            renderAssigneeSelects();
        } catch(e) { 
            console.error('Ошибка загрузки пользователей', e);
        }
    }

    async function loadAllProjects() {
        try {
            const projects = await apiRequest('/projects', 'GET');
            projectsMap.clear();
            projects.forEach(p => {
                projectsMap.set(p.id, { 
                    id: p.id, 
                    name: p.name, 
                    description: p.description, 
                    ownerName: p.ownerNameString 
                });
            });
            renderAllProjectsList();
            renderMyProjectsList();
            renderProjectSelect();
            renderProjectFilter();
        } catch(e) { 
            console.error('Ошибка загрузки проектов', e);
        }
    }

    async function loadMyProjects() {
        if (!currentUser) return;
        try {
            const projects = await apiRequest(`/projects/ownerId/${currentUser.id}`, 'GET');
            return projects;
        } catch(e) {
            console.error('Ошибка загрузки моих проектов', e);
            return [];
        }
    }

    async function loadTasks() {
        try {
            const tasks = await apiRequest('/tasks', 'GET');
            allTasks = tasks;
            renderTasksList();
        } catch(e) { 
            console.error('Ошибка загрузки задач', e);
        }
    }

    async function loadComments(taskId) {
        try {
            const comments = await apiRequest(`/comments/task/${taskId}/comments`, 'GET');
            commentsCache.set(taskId, comments);
            return comments;
        } catch(e) {
            console.error('Ошибка загрузки комментариев', e);
            return [];
        }
    }

    async function addComment(taskId, text) {
        if (!currentUser) return;
        try {
            const comment = {
                taskId: taskId,
                userId: currentUser.id,
                text: text,
                createdAt: new Date().toISOString()
            };
            await apiRequest('/comments', 'POST', comment);
            await loadComments(taskId);
            renderTasksList(); // Обновляем отображение задач
        } catch(e) {
            alert('Ошибка при добавлении комментария: ' + e.message);
        }
    }

    async function createProject(name, description) {
        if (!currentUser) throw new Error('Не авторизован');
        await apiRequest('/projects', 'POST', {
            name,
            description,
            ownerId: currentUser.id
        });
        await loadAllProjects();
    }

    async function deleteProject(projectId) {
        if (confirm('Удалить проект и все его задачи?')) {
            await apiRequest(`/projects/${projectId}`, 'DELETE');
            await loadAllProjects();
            await loadTasks();
        }
    }

    async function createTask(title, description, projectId, assigneeId, priority) {
        await apiRequest('/tasks', 'POST', {
            title,
            description,
            projectId: Number(projectId),
            assigneeId: Number(assigneeId),
            priority: priority,
            status: 'TODO'
        });
        await loadTasks();
    }

    async function updateTaskStatus(taskId, newStatus) {
        await apiRequest(`/tasks/${taskId}/status?status=${newStatus}`, 'PUT');
        await loadTasks();
    }

    async function deleteTask(taskId) {
        if (confirm('Удалить задачу?')) {
            await apiRequest(`/tasks/${taskId}`, 'DELETE');
            await loadTasks();
        }
    }

    // Рендеры
    function renderAllProjectsList() {
        const container = document.getElementById('allProjectsList');
        if (!container) return;
        
        if (projectsMap.size === 0) {
            container.innerHTML = '<div class="text-center">Нет проектов</div>';
            return;
        }
        
        let html = '';
        for (let [id, proj] of projectsMap.entries()) {
            html += `
                <div class="project-card">
                    <div class="flex-between">
                        <div class="project-name">📁 ${escapeHtml(proj.name)}</div>
                    </div>
                    <div class="project-meta">${escapeHtml(proj.description || 'Нет описания')}</div>
                    <div class="text-sm">👤 Владелец: ${escapeHtml(proj.ownerName || '—')}</div>
                </div>
            `;
        }
        container.innerHTML = html;
    }

    async function renderMyProjectsList() {
        const container = document.getElementById('myProjectsList');
        if (!container || !currentUser) return;
        
        try {
            const myProjects = await loadMyProjects();
            
            if (!myProjects || myProjects.length === 0) {
                container.innerHTML = '<div class="text-center">У вас пока нет проектов. Создайте первый!</div>';
                return;
            }
            
            let html = '';
            for (let proj of myProjects) {
                html += `
                    <div class="project-card">
                        <div class="flex-between">
                            <div class="project-name">📁 ${escapeHtml(proj.name)}</div>
                            <button class="danger small" data-project-del="${proj.id}">🗑️ Удалить</button>
                        </div>
                        <div class="project-meta">${escapeHtml(proj.description || 'Нет описания')}</div>
                        <div class="text-sm">📊 Количество задач: ${countTasksByProject(proj.id)}</div>
                    </div>
                `;
            }
            container.innerHTML = html;
            
            document.querySelectorAll('[data-project-del]').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const id = btn.getAttribute('data-project-del');
                    await deleteProject(id);
                });
            });
        } catch(e) {
            container.innerHTML = '<div class="text-center">Ошибка загрузки проектов</div>';
        }
    }

    function countTasksByProject(projectId) {
        return allTasks.filter(task => task.projectId === projectId).length;
    }

    async function renderTasksList() {
        const container = document.getElementById('tasksList');
        if (!container) return;
        
        const filterProjectId = document.getElementById('filterProjectId')?.value;
        let filteredTasks = allTasks;
        
        if (filterProjectId && filterProjectId !== 'all') {
            filteredTasks = allTasks.filter(task => task.projectId == filterProjectId);
        }
        
        if (!filteredTasks.length) {
            container.innerHTML = '<div class="text-center">Нет задач</div>';
            return;
        }
        
        let html = '';
        for (let task of filteredTasks) {
            const projectName = task.projectNameString || 'Без проекта';
            const assignee = task.assigneeName || 'Не назначен';
            const statusText = { 
                'TODO': '📌 К выполнению', 
                'IN_PROGRESS': '⚙️ В работе', 
                'DONE': '✅ Выполнено' 
            }[task.status] || 'К выполнению';
            
            const priorityText = { 
                'LOW': 'Низкий', 
                'MEDIUM': 'Средний', 
                'HIGH': 'Высокий' 
            }[task.priority] || 'Средний';
            
            const comments = commentsCache.get(task.id) || [];
            
            html += `
                <div class="task-card">
                    <div class="flex-between">
                        <div class="task-title">📌 ${escapeHtml(task.title)}</div>
                        <div>
                            <span class="badge priority-${task.priority}">${priorityText}</span>
                            <span class="badge status-${task.status}">${statusText}</span>
                        </div>
                    </div>
                    <div class="task-meta">
                        <span>📁 ${escapeHtml(projectName)}</span>
                        <span>👤 Исполнитель: ${escapeHtml(assignee)}</span>
                    </div>
                    <div class="text-sm">${escapeHtml(task.description || 'Нет описания')}</div>
                    
                    <div class="mt-2 flex-between">
                        <select class="status-select" data-task-id="${task.id}">
                            <option value="TODO" ${task.status === 'TODO' ? 'selected' : ''}>📌 К выполнению</option>
                            <option value="IN_PROGRESS" ${task.status === 'IN_PROGRESS' ? 'selected' : ''}>⚙️ В работе</option>
                            <option value="DONE" ${task.status === 'DONE' ? 'selected' : ''}>✅ Выполнено</option>
                        </select>
                        <button class="danger small" data-task-del="${task.id}">Удалить</button>
                    </div>
                    
                    <div class="comment-section">
                        <div class="flex-between">
                            <strong>💬 Комментарии (${comments.length})</strong>
                            <button class="secondary small" data-show-comment-form="${task.id}">Добавить</button>
                        </div>
                        <div id="comments-${task.id}" class="hidden">
                            <textarea id="comment-text-${task.id}" rows="2" placeholder="Ваш комментарий..." class="mt-2"></textarea>
                            <button class="success small" data-add-comment="${task.id}">Отправить</button>
                        </div>
                        <div id="comments-list-${task.id}">
                            ${renderComments(comments)}
                        </div>
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
        
        // Обработчики статусов
        document.querySelectorAll('.status-select').forEach(select => {
            select.addEventListener('change', async (e) => {
                const taskId = select.getAttribute('data-task-id');
                const newStatus = select.value;
                await updateTaskStatus(taskId, newStatus);
            });
        });
        
        // Обработчики удаления
        document.querySelectorAll('[data-task-del]').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const taskId = btn.getAttribute('data-task-del');
                await deleteTask(taskId);
            });
        });
        
        // Обработчики показа формы комментария
        document.querySelectorAll('[data-show-comment-form]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const taskId = btn.getAttribute('data-show-comment-form');
                const formDiv = document.getElementById(`comments-${taskId}`);
                if (formDiv) {
                    formDiv.classList.toggle('hidden');
                }
            });
        });
        
        // Обработчики добавления комментария
        document.querySelectorAll('[data-add-comment]').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const taskId = btn.getAttribute('data-add-comment');
                const textarea = document.getElementById(`comment-text-${taskId}`);
                const text = textarea.value.trim();
                if (text) {
                    await addComment(taskId, text);
                    textarea.value = '';
                    document.getElementById(`comments-${taskId}`)?.classList.add('hidden');
                } else {
                    alert('Введите текст комментария');
                }
            });
        });
    }
    
    function renderComments(comments) {
        if (!comments || comments.length === 0) {
            return '<div class="text-sm" style="margin-top: 0.5rem; color: #94a3b8;">Нет комментариев</div>';
        }
        
        let html = '';
        for (let comment of comments) {
            const userName = usersMap.get(comment.userId)?.name || `Пользователь ${comment.userId}`;
            const date = comment.createdAt ? new Date(comment.createdAt).toLocaleString() : 'только что';
            html += `
                <div class="comment-item">
                    <div class="comment-meta">
                        <strong>${escapeHtml(userName)}</strong> · ${date}
                    </div>
                    <div class="comment-text">${escapeHtml(comment.text)}</div>
                </div>
            `;
        }
        return html;
    }

    function renderUsersList() {
        const container = document.getElementById('usersList');
        if (!container) return;
        
        if (usersMap.size === 0) {
            container.innerHTML = '<div>Нет пользователей</div>';
            return;
        }
        
        let html = '';
        for (let [id, user] of usersMap.entries()) {
            html += `
                <div class="user-card">
                    <div><strong>${escapeHtml(user.name)}</strong></div>
                    <div class="text-sm">📧 ${escapeHtml(user.email)}</div>
                </div>
            `;
        }
        container.innerHTML = html;
    }

    function renderProjectSelect() {
        const select = document.getElementById('taskProjectId');
        if (!select) return;
        
        let options = '<option value="">-- Выберите проект --</option>';
        for (let [id, proj] of projectsMap.entries()) {
            options += `<option value="${id}">${escapeHtml(proj.name)}</option>`;
        }
        select.innerHTML = options;
    }
    
    function renderProjectFilter() {
        const select = document.getElementById('filterProjectId');
        if (!select) return;
        
        let options = '<option value="all">Все проекты</option>';
        for (let [id, proj] of projectsMap.entries()) {
            options += `<option value="${id}">${escapeHtml(proj.name)}</option>`;
        }
        select.innerHTML = options;
        
        select.addEventListener('change', () => renderTasksList());
    }

    function renderAssigneeSelects() {
        const assigneeSelect = document.getElementById('taskAssigneeId');
        if (!assigneeSelect) return;
        
        let options = '<option value="">-- Назначить --</option>';
        for (let [id, user] of usersMap.entries()) {
            options += `<option value="${id}">${escapeHtml(user.name)}</option>`;
        }
        assigneeSelect.innerHTML = options;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Инициализация после логина
    async function afterLoginSuccess() {
        document.getElementById('authPanel').classList.add('hidden');
        document.getElementById('mainApp').classList.remove('hidden');
        document.getElementById('currentUserSpan').innerText = `👋 ${currentUser.name}`;
        
        await loadAllUsers();
        await loadAllProjects();
        await loadTasks();
        
        // Загружаем комментарии для всех задач
        for (let task of allTasks) {
            await loadComments(task.id);
        }
        
        setupEventListeners();
    }

    function setupEventListeners() {
        // Вкладки
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.removeEventListener('click', btn._listener);
            btn._listener = () => {
                const tabId = btn.getAttribute('data-tab');
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.tab-content').forEach(tc => tc.classList.add('hidden'));
                document.getElementById(`${tabId}Tab`).classList.remove('hidden');
                
                if (tabId === 'projects') loadAllProjects();
                if (tabId === 'myProjects') renderMyProjectsList();
                if (tabId === 'tasks') { loadAllProjects(); loadTasks(); loadAllUsers(); }
                if (tabId === 'users') loadAllUsers();
            };
            btn.addEventListener('click', btn._listener);
        });

        // Создание проекта
        const createProjectBtn = document.getElementById('createProjectBtn');
        if (createProjectBtn) {
            createProjectBtn.removeEventListener('click', createProjectBtn._handler);
            createProjectBtn._handler = async () => {
                const name = document.getElementById('projectName').value.trim();
                const desc = document.getElementById('projectDesc').value;
                if (!name) { alert('Введите название проекта'); return; }
                await createProject(name, desc);
                document.getElementById('projectName').value = '';
                document.getElementById('projectDesc').value = '';
                alert('Проект создан!');
                // Переключаемся на вкладку "Мои проекты"
                document.querySelector('[data-tab="myProjects"]').click();
            };
            createProjectBtn.addEventListener('click', createProjectBtn._handler);
        }

        // Создание задачи
        const createTaskBtn = document.getElementById('createTaskBtn');
        if (createTaskBtn) {
            createTaskBtn.removeEventListener('click', createTaskBtn._handler);
            createTaskBtn._handler = async () => {
                const title = document.getElementById('taskTitle').value.trim();
                const desc = document.getElementById('taskDesc').value;
                const projectId = document.getElementById('taskProjectId').value;
                const assigneeId = document.getElementById('taskAssigneeId').value;
                const priority = document.getElementById('taskPriority').value;
                
                if (!title) { alert('Введите название задачи'); return; }
                if (!projectId) { alert('Выберите проект'); return; }
                if (!assigneeId) { alert('Выберите исполнителя'); return; }
                
                await createTask(title, desc, projectId, assigneeId, priority);
                document.getElementById('taskTitle').value = '';
                document.getElementById('taskDesc').value = '';
                alert('Задача создана!');
                // Переключаемся на вкладку задач
                document.querySelector('[data-tab="tasks"]').click();
            };
            createTaskBtn.addEventListener('click', createTaskBtn._handler);
        }
    }

    // Авторизация
    document.getElementById('showRegisterBtn')?.addEventListener('click', () => {
        document.getElementById('loginForm').classList.add('hidden');
        document.getElementById('registerForm').classList.remove('hidden');
    });
    
    document.getElementById('backToLoginBtn')?.addEventListener('click', () => {
        document.getElementById('registerForm').classList.add('hidden');
        document.getElementById('loginForm').classList.remove('hidden');
    });

    document.getElementById('doLoginBtn')?.addEventListener('click', async () => {
        const name = document.getElementById('loginName').value.trim();
        const password = document.getElementById('loginPassword').value;
        
        if (!name || !password) {
            document.getElementById('loginError').innerText = 'Заполните имя и пароль';
            return;
        }
        
        try {
            const userDto = await loginUser(name, password);
            currentUser = { id: userDto.id, name: userDto.name, email: userDto.email };
            localStorage.setItem('tasktracker_user', JSON.stringify(currentUser));
            await afterLoginSuccess();
        } catch(e) {
            document.getElementById('loginError').innerText = 'Ошибка входа: ' + e.message;
        }
    });

    document.getElementById('doRegisterBtn')?.addEventListener('click', async () => {
        const name = document.getElementById('regName').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value;
        
        if (!name || !email || !password) {
            document.getElementById('regError').innerText = 'Заполните все поля';
            return;
        }
        if (password.length < 8) {
            document.getElementById('regError').innerText = 'Пароль должен быть не менее 8 символов';
            return;
        }
        
        try {
            const newUser = await registerUser(name, email, password);
            currentUser = { id: newUser.id, name: newUser.name, email: newUser.email };
            localStorage.setItem('tasktracker_user', JSON.stringify(currentUser));
            await afterLoginSuccess();
        } catch(e) {
            document.getElementById('regError').innerText = 'Ошибка регистрации: ' + e.message;
        }
    });

    document.getElementById('logoutBtn')?.addEventListener('click', () => {
        localStorage.removeItem('tasktracker_user');
        currentUser = null;
        document.getElementById('authPanel').classList.remove('hidden');
        document.getElementById('mainApp').classList.add('hidden');
    });

    // Автоматический вход
    async function checkAutoLogin() {
        const saved = localStorage.getItem('tasktracker_user');
        if (saved) {
            try {
                const user = JSON.parse(saved);
                const response = await fetch(`${API_BASE}/users`);
                if (response.ok) {
                    currentUser = user;
                    await afterLoginSuccess();
                    return;
                }
            } catch(e) {}
            localStorage.removeItem('tasktracker_user');
        }
        document.getElementById('authPanel').classList.remove('hidden');
        document.getElementById('mainApp').classList.add('hidden');
    }
    
    checkAutoLogin();
</script>
</body>
</html>
